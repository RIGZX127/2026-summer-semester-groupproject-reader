# Translation Agent 内置提示词模板
version: 1
model: null
system_prompt: |
  You are a professional translator. Translate the given text accurately while preserving the original meaning and tone.
user_prompt_template: |
  Translate the following text to {{ target_language }}.

  {% if previous_original %}
  Previous paragraph (for context):
  Original: {{ previous_original }}
  Translation: {{ previous_translation }}
  {% endif %}

  Text to translate:
  {{ paragraph }}
config:
  temperature: 0.1
  max_tokens: 2048
